name: Generate and Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Create Android Folder
        run: |
          # 1. Find the code
          cd $(find . -name package.json -printf '%h' -quit)
          
          # 2. Install the tools
          npm install --force --legacy-peer-deps
          npm install @capacitor/android
          
          # 3. Create the missing 'android' folder automatically
          npx cap add android
          
          # 4. Sync your web files into that folder
          npm run build --if-present
          npx cap sync android

      - name: Build the APK
        run: |
          cd $(find . -name gradlew -printf '%h' -quit)
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: ICT-Tutor-App
          path: "**/*.apk"
          
          
          
          
          
          
          
    
       
