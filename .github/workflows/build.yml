name: Final Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android Project
        run: |
          PATH_TO_CODE=$(find . -name package.json -printf '%h' -quit)
          cd "$PATH_TO_CODE"
          
          # 1. Install tools without running full build
          npm install @capacitor/core @capacitor/cli @capacitor/android --save --legacy-peer-deps
          
          # 2. Setup the config
          npx cap init "ICT Tutor" "com.sithum.icttutor" --web-dir build
          
          # 3. Create a fake build folder just to keep Capacitor happy
          mkdir -p build && touch build/index.html
          
          # 4. Add the android folder
          npx cap add android
          npx cap sync android

      - name: Build APK
        run: |
          cd $(find . -name gradlew -printf '%h' -quit)
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: ICT-Tutor-App
          path: "**/*.apk"
          
          
          
          
          

          
          
          
          
          
          
          
    
       
