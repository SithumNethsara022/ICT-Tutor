name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Install Dependencies
        run: |
          PATH_TO_CODE=$(find . -name package.json -printf '%h' -quit)
          cd "$PATH_TO_CODE"
          # Using --force to bypass the react-day-picker conflict
          npm install --force --legacy-peer-deps
          npm run build --if-present

      - name: Build Android APK
        run: |
          PATH_TO_ANDROID=$(find . -name gradlew -printf '%h' -quit)
          cd "$PATH_TO_ANDROID"
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ICT-Tutor-APK
          path: "**/*.apk"
          
          
          
          
    
       
