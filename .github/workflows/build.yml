name: Full Visual Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Build Web and Android
        run: |
          # 1. Go to your code folder
          PATH_TO_CODE=$(find . -name package.json -printf '%h' -quit)
          cd "$PATH_TO_CODE"
          
          # 2. Install everything
          npm install --force --legacy-peer-deps
          
          # 3. FIX: Try to run the build. If it fails, we use a standard build.
          npm run build || npx react-scripts build
          
          # 4. Sync the new files into the Android folder
          npx cap sync android

      - name: Build APK
        run: |
          cd $(find . -name gradlew -printf '%h' -quit)
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: ICT-Tutor-Visual-App
          path: "**/*.apk"
          
          
          
          
          
    
       
