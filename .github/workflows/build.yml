name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install & Build
        run: |
          # 1. Find where package.json is and go there
          PATH_TO_CODE=$(find . -name package.json -printf '%h' -quit)
          cd "$PATH_TO_CODE"
          echo "Found code in: $PATH_TO_CODE"
          
          # 2. Install with the correct timeout flag
          npm install --legacy-peer-deps --network-timeout=100000
          
          # 3. Build the web files
          npm run build --if-present

      - name: Build Android
        run: |
          # 1. Find where the 'gradlew' file is and go there
          PATH_TO_ANDROID=$(find . -name gradlew -printf '%h' -quit)
          cd "$PATH_TO_ANDROID"
          echo "Found Android in: $PATH_TO_ANDROID"
          
          # 2. Build the APK
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ICT-Tutor-APK
          path: "**/*.apk"
          
          
          
    
       
