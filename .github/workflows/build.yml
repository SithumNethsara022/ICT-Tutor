name: ICT Tutor Universal Fix
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Build Web Assets
        run: |
          # Automatically find the folder containing package.json
          ROOT_DIR=$(find . -name package.json -printf '%h' -quit)
          cd "$ROOT_DIR"
          echo "Found web code in: $ROOT_DIR"
          
          npm install --force --legacy-peer-deps
          CI=false npm run build --if-present

      - name: Sync and Build APK
        run: |
          # Automatically find the folder containing the Android project
          ANDROID_DIR=$(find . -name gradlew -printf '%h' -quit)
          cd "$ANDROID_DIR"
          echo "Found Android project in: $ANDROID_DIR"
          
          # Sync Capacitor if it's being used
          if [ -f "../../capacitor.config.ts" ] || [ -f "../../capacitor.config.json" ]; then
            cd ../.. && npx cap sync android && cd android
          fi
          
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: ICT-Tutor-Final
          path: "**/*.apk"
          
          
          
          
          
    
       
