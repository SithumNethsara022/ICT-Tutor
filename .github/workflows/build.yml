name: Force Create Android and Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix Dependencies and Generate Folder
        run: |
          # 1. Find the code folder
          PATH_TO_CODE=$(find . -name package.json -printf '%h' -quit)
          cd "$PATH_TO_CODE"
          
          # 2. Force install the Capacitor tools (this skips the conflict)
          npm install @capacitor/core @capacitor/cli @capacitor/android --save --legacy-peer-deps
          
          # 3. Create the android folder
          npx cap add android
          
          # 4. Final sync
          npm run build --if-present
          npx cap sync android

      - name: Build APK
        run: |
          cd $(find . -name gradlew -printf '%h' -quit)
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ICT-Tutor-App
          path: "**/*.apk"
          
          

          
          
          
          
          
          
          
    
       
