name: ICT Tutor Visual Fix
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Build Web Assets
        run: |
          # 1. Enter the frontend folder immediately
          cd frontend
          
          # 2. Force install dependencies
          npm install --force --legacy-peer-deps
          
          # 3. Create a production build of your website
          # This creates the actual "visuals" for the app
          CI=false npm run build

      - name: Sync to Android
        run: |
          cd frontend
          # Tell Capacitor to take the new 'build' folder and put it in Android
          npx cap sync android

      - name: Build Final APK
        run: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: ICT-Tutor-Working
          path: "frontend/android/app/build/outputs/apk/debug/app-debug.apk"
          
          
          
          
          
    
       
