name: ICT Tutor Deep Repair Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Attempt Web Build
        run: |
          # Find where package.json is
          WEB_DIR=$(find . -name package.json -printf '%h' -quit)
          cd "$WEB_DIR"
          npm install --force --legacy-peer-deps
          # Build the visuals, but don't stop if it warns about Craco
          CI=false npm run build --if-present || true

      - name: Sync and Final APK Build
        run: |
          # 1. Find the Android engine (gradlew)
          GRADLE_PATH=$(find . -name gradlew -printf '%h' -quit)
          
          # 2. If it's missing, try to add it back
          if [ -z "$GRADLE_PATH" ]; then
            echo "Android folder missing! Attempting to regenerate..."
            npx cap add android || true
            GRADLE_PATH=$(find . -name gradlew -printf '%h' -quit)
          fi
          
          # 3. Go to that folder and build
          cd "$GRADLE_PATH"
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: ICT-Tutor-Repaired
          path: "**/*.apk"
          
          
          
          
          
          
    
       
