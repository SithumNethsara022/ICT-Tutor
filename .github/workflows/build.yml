name: ICT Tutor Total Regeneration
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Build and Force Create Android
        run: |
          # 1. Find the web code
          WEB_DIR=$(find . -name package.json -printf '%h' -quit)
          cd "$WEB_DIR"
          
          # 2. Install tools
          npm install --force --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/android --save --legacy-peer-deps
          
          # 3. Create the config and the Android folder with the ID
          # This fixes the "Missing appId" error once and for all!
          npx cap init "ICT Tutor" "com.sithum.icttutor" --web-dir build --force
          npx cap add android
          
          # 4. Create a production build of your visuals
          CI=false npm run build --if-present || (mkdir -p build && touch build/index.html)
          npx cap sync android

      - name: Compile APK
        run: |
          # Find the new gradlew file we just created
          GRADLE_PATH=$(find . -name gradlew -printf '%h' -quit)
          cd "$GRADLE_PATH"
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: ICT-Tutor-Regenerated
          path: "**/*.apk"
          
          
          
          
          
          
    
       
